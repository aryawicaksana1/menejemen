<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Kost Acarya</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
        }

        body {
            margin: 0;
            padding: 2rem;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
            background-attachment: fixed;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-weight: 600;
            letter-spacing: -0.025em;
            margin: 0 0 0.5rem 0;
            font-size: 2.5rem;
        }

        .header p {
            color: var(--text-muted);
            margin: 0;
        }

        .section-title {
            max-width: 1200px;
            margin: 3rem auto 1.5rem auto;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title span {
            color: var(--accent-blue);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto 3rem auto;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-number {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge.kosong {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge.terisi {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .occupant-data {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .occupant-data strong {
            color: var(--text-main);
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: auto;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-primary { background-color: var(--accent-blue); }
        .btn-danger { background-color: var(--accent-red); }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        .modal-overlay.active { display: flex; }

        .modal-content {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h2 { margin-top: 0; }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 0.5rem;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent-blue);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .btn-cancel {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dashboard Manajemen Kost</h1>
        <p>Pemantauan Status Kamar & Data Diri Penghuni</p>
    </div>

    <!-- Section Kost Acarya 2 -->
    <h2 class="section-title"><span>■</span> Data Penghuni Kost Acarya 2</h2>
    <div class="grid-container" id="gridAcarya2">
        <!-- Kamar Acarya 2 di-render di sini -->
    </div>

    <!-- Section Kost Acarya 1 -->
    <h2 class="section-title"><span>■</span> Data Penghuni Kost Acarya 1</h2>
    <div class="grid-container" id="gridAcarya1">
        <!-- Kamar Acarya 1 di-render di sini -->
    </div>

    <!-- Modal for adding occupant -->
    <div class="modal-overlay" id="formModal">
        <div class="modal-content">
            <h2 id="modalTitle">Isi Data Penghuni</h2>
            <form id="occupantForm">
                <input type="hidden" id="roomId">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="nama" required placeholder="Masukkan nama penghuni">
                </div>
                <div class="form-group">
                    <label>Nomor WhatsApp</label>
                    <input type="tel" id="telepon" required placeholder="08xxxxxxxxxx">
                </div>
                <div class="form-group">
                    <label>Nomor WA Orang Tua</label>
                    <input type="tel" id="no_ortu" required placeholder="08xxxxxxxxxx">
                </div>
                <div class="form-group">
                    <label>Tempat Tinggal (Asal)</label>
                    <input type="text" id="tempat_tinggal" required placeholder="Masukkan kota/alamat asal">
                </div>
                <div class="form-group">
                    <label>Tanggal Masuk</label>
                    <input type="date" id="tanggal" required>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Gunakan key localStorage baru karena struktur datanya berubah
        let roomsData = JSON.parse(localStorage.getItem('kostDataV3')) || [];

        // Inisialisasi Data jika kosong (Pertama kali buka web)
        if (roomsData.length === 0) {
            // Generate Data 18 Kamar untuk Kost Acarya 2
            for(let i = 1; i <= 18; i++) {
                roomsData.push({
                    id: `A2-${i}`, // ID Unik contoh: A2-1
                    building: 'Acarya 2',
                    nomor: `Kamar ${String(i).padStart(2, '0')}`,
                    status: 'kosong',
                    penghuni: null // penghuni: { nama, telepon, no_ortu, tempat_tinggal, tanggal, tanggal_keluar }
                });
            }

            // Generate Data 11 Kamar untuk Kost Acarya 1
            for(let i = 1; i <= 11; i++) {
                roomsData.push({
                    id: `A1-${i}`, // ID Unik contoh: A1-1
                    building: 'Acarya 1',
                    nomor: `Kamar ${String(i).padStart(2, '0')}`,
                    status: 'kosong',
                    penghuni: null 
                });
            }
            saveData();
        }

        // Fungsi Simpan ke LocalStorage
        function saveData() {
            localStorage.setItem('kostDataV3', JSON.stringify(roomsData));
        }

        // Fungsi membuat elemen Card HTML (REVISED)
        function createCardHTML(room) {
            const isKosong = room.status === 'kosong';
            const badgeClass = isKosong ? 'kosong' : 'terisi';
            const badgeText = isKosong ? 'Tersedia' : 'Dihuni';

            let actionBtnHTML;
            let occupantHTML;

            const formatDate = (dateString) => {
                if (!dateString) return '-';
                return new Date(dateString).toLocaleDateString('id-ID', {
                    day: '2-digit', month: 'long', year: 'numeric'
                });
            };

            // 1. Generate detail penghuni jika ada (untuk riwayat atau penghuni aktif)
            if (room.penghuni) {
                occupantHTML = `
                    <div class="occupant-data">
                        <div><strong>Nama:</strong> ${room.penghuni.nama}</div>
                        <div><strong>WA:</strong> ${room.penghuni.telepon}</div>
                        <div><strong>WA Ortu:</strong> ${room.penghuni.no_ortu || '-'}</div>
                        <div><strong>Asal:</strong> ${room.penghuni.tempat_tinggal || '-'}</div>
                        <div><strong>Masuk:</strong> ${formatDate(room.penghuni.tanggal)}</div>
                        <div><strong>Keluar:</strong> ${formatDate(room.penghuni.tanggal_keluar)}</div>
                    </div>
                `;
            } else {
                occupantHTML = '<div class="occupant-data">Belum ada data penghuni.</div>';
            }

            // 2. Tentukan tombol aksi berdasarkan status kamar saat ini
            if (isKosong) {
                actionBtnHTML = `<button class="btn btn-primary" onclick="openModal('${room.id}')">Isi Data & Check-in</button>`;
            } else {
                actionBtnHTML = `<button class="btn btn-danger" onclick="checkout('${room.id}')">Kosongkan Kamar (Check-out)</button>`;
            }

            // 3. Gabungkan semua menjadi satu kartu
            return `
                <div class="glass-card">
                    <div class="room-header">
                        <div class="room-number">${room.nomor}</div>
                        <div class="badge ${badgeClass}">${badgeText}</div>
                    </div>
                    ${occupantHTML}
                    ${actionBtnHTML}
                </div>
            `;
        }


        // Fungsi Render UI (Memisahkan Acarya 2 dan Acarya 1)
        function renderRooms() {
            const gridA2 = document.getElementById('gridAcarya2');
            const gridA1 = document.getElementById('gridAcarya1');
            
            gridA2.innerHTML = '';
            gridA1.innerHTML = '';

            roomsData.forEach(room => {
                const cardHTML = createCardHTML(room);
                if (room.building === 'Acarya 2') {
                    gridA2.innerHTML += cardHTML;
                } else if (room.building === 'Acarya 1') {
                    gridA1.innerHTML += cardHTML;
                }
            });
        }

        // Fungsi Modal
        const modal = document.getElementById('formModal');
        const form = document.getElementById('occupantForm');

        function openModal(id) {
            document.getElementById('roomId').value = id;
            const room = roomsData.find(r => r.id === id);
            document.getElementById('modalTitle').innerText = `Isi Data - ${room.building} ${room.nomor}`;
            form.reset();
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // Handle Submit Form (Check-in) (REVISED)
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('roomId').value;
            
            // Buat objek data penghuni baru. Ini akan menimpa data penghuni lama.
            const occupantData = {
                nama: document.getElementById('nama').value,
                telepon: document.getElementById('telepon').value,
                no_ortu: document.getElementById('no_ortu').value,
                tempat_tinggal: document.getElementById('tempat_tinggal').value,
                tanggal: document.getElementById('tanggal').value,
                tanggal_keluar: null // Pastikan tanggal keluar kosong untuk penghuni baru
            };

            const roomIndex = roomsData.findIndex(r => r.id === id);
            if (roomIndex > -1) {
                roomsData[roomIndex].status = 'terisi';
                roomsData[roomIndex].penghuni = occupantData; // Ganti data penghuni dengan yang baru

                saveData();
                renderRooms();
                closeModal();
            }
        });

        // Handle Checkout (Data akan dihapus)
        function checkout(id) {
            if (confirm('Apakah Anda yakin ingin mengosongkan kamar ini? Data penghuni akan dihapus secara otomatis.')) {
                const roomIndex = roomsData.findIndex(r => r.id === id);
                if (roomIndex > -1) {
                    // Ubah status kamar menjadi kosong dan hapus data penghuni
                    roomsData[roomIndex].status = 'kosong';
                    roomsData[roomIndex].penghuni = null;
                    
                    saveData();
                    renderRooms();
                }
            }
        }

        // Jalankan saat pertama kali halaman dimuat
        renderRooms();
    </script>

</body>
</html>
